<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Week Planner</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ── THEME ── */
:root{
  --bg:#f7f6f3; --surface:#fff; --border:#e8e5de; --border-light:#ede9e2;
  --text:#1a1a18; --text-muted:#888880; --text-faint:#b8b5ae;
  --sleep-bg:#ebebf5; --sleep-stripe:rgba(100,100,200,0.06);
  --weekend-head:#faf9f6;
  --sidebar-w:240px; --header-h:40px; --toolbar-h:44px; --time-w:56px;
}
.dark{
  --bg:#16161a; --surface:#1e1e24; --border:#2e2e38; --border-light:#252530;
  --text:#e2e0da; --text-muted:#7a7a80; --text-faint:#44444e;
  --sleep-bg:#12121e; --sleep-stripe:rgba(80,80,160,0.12);
  --weekend-head:#1a1a22;
}

html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;background:var(--bg);color:var(--text);transition:background .2s,color .2s;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--text) 25%,transparent);border-radius:99px;}
#app{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:background .2s,border-color .2s;}
.sb-header{padding:13px 13px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sb-header-text{flex:1;}
.sb-header h1{font-size:14px;font-weight:700;letter-spacing:-.3px;}
.sb-header p{font-size:11px;color:var(--text-muted);margin-top:1px;}
.sb-scroll{flex:1;overflow-y:auto;padding:10px 12px 0;}
.section-label{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text-faint);margin:12px 2px 7px;display:flex;align-items:center;gap:6px;}
.section-label:first-child{margin-top:2px;}
.section-label small{font-size:9px;text-transform:none;letter-spacing:0;font-weight:400;}

.sleep-box{background:color-mix(in srgb,#4a58c8 8%,var(--surface));border-radius:9px;padding:10px 11px;}
.sleep-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.sleep-row:last-of-type{margin-bottom:0;}
.sleep-row label{font-size:12px;color:var(--text-muted);}
.sleep-row select{font-size:11px;padding:4px 7px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text);cursor:pointer;outline:none;}
.sleep-stat{margin-top:8px;background:color-mix(in srgb,#4a58c8 14%,var(--surface));border-radius:6px;padding:6px 9px;font-size:11px;color:#5a68d8;font-weight:500;}

.cat-list{display:flex;flex-direction:column;gap:2px;}
.cat-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:7px;cursor:default;transition:background .1s;position:relative;}
.cat-item:hover{background:color-mix(in srgb,var(--text) 5%,var(--surface));}
.cat-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.cat-check.checked{border-color:transparent;}
.cat-check svg{display:none;}.cat-check.checked svg{display:block;}
.cat-color-swatch{width:13px;height:13px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1.5px solid rgba(128,128,128,.2);position:relative;overflow:hidden;}
.cat-color-swatch input[type="color"]{position:absolute;inset:-4px;opacity:0;cursor:pointer;width:200%;height:200%;border:none;padding:0;}
.cat-name-input{flex:1;font-size:12px;font-family:inherit;border:none;background:transparent;outline:none;color:var(--text);min-width:0;cursor:default;}
.cat-name-input:focus{cursor:text;background:color-mix(in srgb,var(--text) 6%,var(--surface));border-radius:3px;padding:0 3px;}
.cat-hrs{font-size:11px;color:var(--text-faint);flex-shrink:0;min-width:36px;text-align:right;}
.cat-del-btn{width:15px;height:15px;background:none;border:none;color:var(--text-faint);font-size:13px;cursor:pointer;flex-shrink:0;line-height:1;padding:0;opacity:0;transition:opacity .1s;display:flex;align-items:center;justify-content:center;}
.cat-item:hover .cat-del-btn{opacity:1;}.cat-del-btn:hover{color:#e55;}

.add-cat{display:flex;gap:5px;align-items:center;margin-top:8px;padding-bottom:4px;}
.add-cat input[type="text"]{flex:1;min-width:0;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;outline:none;background:var(--surface);color:var(--text);}
.add-cat input[type="text"]:focus{border-color:var(--text-muted);}
input[type="color"].color-swatch{width:27px;height:27px;border:1px solid var(--border);border-radius:6px;padding:2px;cursor:pointer;background:none;flex-shrink:0;}
.add-cat-btn{padding:5px 9px;background:var(--text);color:var(--bg);border:none;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.add-cat-btn:hover{opacity:.8;}

#stats-panel{padding:10px 12px 14px;border-top:1px solid var(--border);}
.stats-label{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text-faint);margin-bottom:9px;}
.stat-row{margin-bottom:6px;}
.stat-top{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stat-name{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stat-val{font-size:12px;font-weight:500;flex-shrink:0;}
.stat-track{height:3px;background:color-mix(in srgb,var(--text) 8%,var(--surface));border-radius:2px;overflow:hidden;margin-left:15px;}
.stat-fill{height:100%;border-radius:2px;transition:width .3s ease;}

/* ── TOOLBAR ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#toolbar{height:var(--toolbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:7px;flex-shrink:0;}
#toolbar h2{font-size:13px;font-weight:600;}
.tb-sep{width:1px;height:16px;background:var(--border);margin:0 1px;}
.tb-btn{height:28px;padding:0 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:12px;font-family:inherit;color:var(--text);display:flex;align-items:center;gap:5px;white-space:nowrap;transition:background .1s;}
.tb-btn:hover{background:color-mix(in srgb,var(--text) 6%,var(--surface));}
.zoom-ctrl{display:flex;align-items:center;gap:5px;}
.zoom-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text);user-select:none;line-height:1;}
.zoom-btn:hover{background:color-mix(in srgb,var(--text) 6%,var(--surface));}
.zoom-label{font-size:11px;color:var(--text-muted);min-width:52px;text-align:center;}
.tb-hint{font-size:11px;color:var(--text-faint);margin-left:auto;}
.icon-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0;font-size:14px;}
.icon-btn:hover{background:color-mix(in srgb,var(--text) 6%,var(--surface));}

/* ── COPY BANNER ── */
#copy-banner{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:12px;padding:7px 18px;border-radius:0 0 10px 10px;z-index:500;pointer-events:none;}
#copy-banner.show{display:block;}

/* ── GRID ── */
#grid-scroll{flex:1;overflow:auto;position:relative;}
#grid{display:flex;min-width:max-content;}
#time-col{width:var(--time-w);min-width:var(--time-w);flex-shrink:0;position:sticky;left:0;z-index:20;background:var(--bg);}
.time-col-head{height:var(--header-h);position:sticky;top:0;background:var(--bg);z-index:25;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.time-label{display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px;padding-top:1px;user-select:none;line-height:1;position:absolute;left:0;right:0;}
.time-label.hour-lbl{font-size:10px;color:var(--text-faint);}
.time-label.half-lbl{font-size:9px;color:var(--text-faint);opacity:.6;}

#days-area{flex:1;display:flex;}
.day-col{flex:1;min-width:90px;position:relative;border-right:1px solid var(--border-light);}
.day-col:last-child{border-right:none;}

/* Day header with total badge */
.day-head{height:var(--header-h);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;transition:background .15s;background:var(--surface);}
.day-head.weekend{background:var(--weekend-head);}
.day-head-name{font-size:12px;font-weight:500;color:var(--text-muted);line-height:1.2;}
.day-head-total{font-size:10px;color:var(--text-faint);line-height:1.2;}
/* paste target */
.day-head.paste-target{background:color-mix(in srgb,#4a9eff 16%,var(--surface))!important;cursor:copy;}
.day-head.paste-target .day-head-name{color:#4a9eff;}

.day-body{position:relative;cursor:crosshair;}
.h-line{position:absolute;left:0;right:0;pointer-events:none;}
.h-line.hour{border-top:1px solid var(--border);}
.h-line.half{border-top:1px dashed var(--border-light);}
/* Sleep zone uses a subtle stripe pattern for stronger dark-mode contrast */
.h-line.sleep{background:var(--sleep-bg);}
.sel-ghost{position:absolute;left:3px;right:3px;border-radius:5px;border:2px dashed rgba(128,128,128,.4);background:rgba(128,128,128,.06);pointer-events:none;z-index:30;}

/* ── BLOCKS ── */
.block{position:absolute;border-radius:5px;overflow:hidden;cursor:grab;user-select:none;display:flex;flex-direction:column;transition:box-shadow .1s;min-height:8px;}
.block:hover{box-shadow:0 2px 12px rgba(0,0,0,.2);}
.block:active{cursor:grabbing;}
.block.hidden{display:none!important;}
.block-body{flex:1;padding:3px 6px 2px;overflow:hidden;min-height:0;}
.block-title{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;color:var(--text);}
.block-notes{font-size:10px;overflow:hidden;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
/* micro blocks: only show colored left border, no text overflow issues */
.block.micro .block-body{padding:1px 4px;}
.block.micro .block-title{font-size:10px;}
.block.micro .block-notes{display:none;}
.block-resize{height:6px;cursor:ns-resize;flex-shrink:0;background:rgba(128,128,128,.15);display:flex;align-items:center;justify-content:center;}
.block-resize::after{content:'';width:18px;height:2px;background:rgba(128,128,128,.3);border-radius:1px;}
/* hide resize handle on very small blocks */
.block.micro .block-resize{height:3px;}
.block.micro .block-resize::after{display:none;}
/* hover tooltip for micro blocks */
.block[title]{cursor:grab;}

/* ── TIME TOOLTIP ── */
#time-tooltip{position:fixed;background:#1a1a18;color:#fff;font-size:11px;padding:3px 8px;border-radius:5px;pointer-events:none;z-index:9999;display:none;white-space:nowrap;font-family:inherit;}

/* ── TOASTS ── */
#undo-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:12px;padding:6px 14px;border-radius:8px;pointer-events:none;opacity:0;z-index:9000;transition:opacity .2s;}
#undo-toast.show{opacity:1;}

/* ── MODAL ── */
#modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;}
#modal-backdrop.open{display:flex;}
#modal{background:var(--surface);border-radius:12px;width:360px;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden;animation:modal-in .14s ease;border:1px solid var(--border);}
@keyframes modal-in{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:none;}}
.modal-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{font-size:14px;font-weight:600;}
.modal-close{background:none;border:none;font-size:20px;color:var(--text-faint);cursor:pointer;line-height:1;padding:2px 6px;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:14px 16px;}
.modal-day-info{font-size:11px;color:var(--text-faint);margin-bottom:12px;font-weight:500;}
.time-row{display:flex;gap:10px;}.time-row .form-group{flex:1;}
.form-group{margin-bottom:12px;}.form-group:last-child{margin-bottom:0;}
.form-group label{display:block;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-faint);margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border-color .1s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--text-muted);}
.form-group textarea{resize:vertical;min-height:60px;}
.repeat-section{margin-bottom:12px;}
.repeat-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-faint);margin-bottom:7px;display:block;}
.day-chips{display:flex;gap:5px;flex-wrap:wrap;}
.day-chip{width:32px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .1s;user-select:none;}
.day-chip.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.day-chip:hover:not(.on){background:color-mix(in srgb,var(--text) 7%,var(--surface));}
.modal-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;}
.btn-delete{padding:7px 13px;background:var(--surface);border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;color:#e44;cursor:pointer;}
.btn-delete:hover{background:color-mix(in srgb,#e44 8%,var(--surface));}
.btn-dupe{padding:7px 13px;background:var(--surface);border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;color:var(--text-muted);cursor:pointer;}
.btn-dupe:hover{background:color-mix(in srgb,var(--text) 5%,var(--surface));}
.btn-save{flex:1;padding:8px;background:var(--text);color:var(--bg);border:none;border-radius:7px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;}
.btn-save:hover{opacity:.85;}

@media print{
  @page{size:A3 landscape;margin:10mm;}
  #time-tooltip,#copy-banner,#undo-toast,#modal-backdrop{display:none!important;}
  body{overflow:visible!important;height:auto!important;}
  #app{height:auto!important;overflow:visible!important;}
  #main{overflow:visible!important;}
  #grid-scroll{overflow:visible!important;height:auto!important;}
  #grid{min-width:unset!important;}
  #sidebar{min-width:180px!important;width:180px!important;}
  #toolbar{display:none!important;}
  .block-resize{display:none!important;}
}
</style>
</head>
<body>
<div id="app">

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-header">
    <div class="sb-header-text">
      <h1>Ideal Week</h1>
      <p>Design your perfect week</p>
    </div>
    <button class="icon-btn" id="dark-toggle" title="Toggle dark mode">🌙</button>
  </div>
  <div class="sb-scroll">
    <div class="section-label">Day Boundaries</div>
    <div class="sleep-box">
      <div class="sleep-row"><label>Wake up</label><select id="wake-select"></select></div>
      <div class="sleep-row"><label>Sleep at</label><select id="sleep-select"></select></div>
      <div class="sleep-stat" id="sleep-stat">Sleep: — · —</div>
    </div>
    <div class="section-label">Categories <small>(click name to rename)</small></div>
    <div class="cat-list" id="cat-list"></div>
    <div class="add-cat">
      <input type="text" id="new-cat-name" placeholder="New category…" maxlength="24">
      <input type="color" id="new-cat-color" class="color-swatch" value="#4a9eff">
      <button class="add-cat-btn" id="add-cat-btn">Add</button>
    </div>
  </div>
  <div id="stats-panel">
    <div class="stats-label">Weekly Hours</div>
    <div id="stats-list"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="toolbar">
    <h2>Weekly Grid</h2>
    <div class="tb-sep"></div>
    <div class="zoom-ctrl">
      <button class="zoom-btn" id="zoom-out">−</button>
      <span class="zoom-label" id="zoom-label">60 px/h</span>
      <button class="zoom-btn" id="zoom-in">+</button>
    </div>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="undo-btn">↩ Undo</button>
    <button class="tb-btn" id="export-btn">⬇ Export PDF</button>
    <span class="tb-hint" id="tb-hint">Drag to create · Click to edit · Ctrl+C on block to copy</span>
  </div>
  <div id="grid-scroll">
    <div id="grid">
      <div id="time-col"><div class="time-col-head"></div></div>
      <div id="days-area"></div>
    </div>
  </div>
</div>
</div>

<div id="copy-banner">📋 Block copied — click a day header to paste · Esc to cancel</div>
<div id="time-tooltip"></div>
<div id="undo-toast"></div>

<!-- MODAL -->
<div id="modal-backdrop">
  <div id="modal">
    <div class="modal-head">
      <h3 id="modal-title-text">New Block</h3>
      <button class="modal-close" id="modal-close-btn">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-day-info" id="modal-day-info"></div>
      <div class="time-row">
        <div class="form-group"><label>Start</label><input type="time" id="f-start" step="60"></div>
        <div class="form-group"><label>End</label><input type="time" id="f-end" step="60"></div>
      </div>
      <div class="form-group"><label>Title</label><input type="text" id="f-title" placeholder="e.g. Lunch, Deep work…" maxlength="60"></div>
      <div class="form-group"><label>Category</label><select id="f-cat"></select></div>
      <div class="form-group"><label>Notes (optional)</label><textarea id="f-notes" placeholder="Details, location, anything…"></textarea></div>
      <div class="repeat-section">
        <span class="repeat-label">Also copy to days</span>
        <div class="day-chips" id="repeat-chips"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-delete" id="modal-del-btn" style="display:none">Delete</button>
      <button class="btn-dupe"   id="modal-dupe-btn" style="display:none">Duplicate</button>
      <button class="btn-save"   id="modal-save-btn">Create block</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════
   CONSTANTS & STATE
═══════════════════════════════════ */
const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYS_FULL  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const MINS       = 24*60;
const ZOOM_LEVELS = [24,36,42,48,60,80,100,120,160,200];
let zoomIdx = 4;

const pxPerMin  = ()=> ZOOM_LEVELS[zoomIdx]/60;
const dayH      = ()=> MINS*pxPerMin();
const minToY    = m => m*pxPerMin();
const yToMin    = y => Math.round(y/pxPerMin());
const yToMinSnap= y => Math.round(yToMin(y)/15)*15;
const clamp     = (v,a,b)=> Math.max(a,Math.min(b,v));
const isDark    = ()=> document.documentElement.classList.contains('dark');

let wakeMin=7*60, sleepMin=23*60, darkMode=false;
let nextId=1;
const uid=()=>String(nextId++);

let categories=[
  {id:'study',    name:'Study',    color:'#4a9eff',visible:true},
  {id:'work',     name:'Work',     color:'#ff8c42',visible:true},
  {id:'food',     name:'Food',     color:'#4caf7d',visible:true},
  {id:'commute',  name:'Commute',  color:'#f4c542',visible:true},
  {id:'personal', name:'Personal', color:'#e87b9b',visible:true},
  {id:'gym',      name:'Gym',      color:'#9c6fff',visible:true},
];
let blocks=[];

// ── Undo: snapshot BEFORE each mutating action
const undoStack=[];
function pushUndo(){
  undoStack.push(JSON.stringify(blocks));
  if(undoStack.length>60)undoStack.shift();
}

// ── Copy/paste
let copiedBlock=null, pasteMode=false;

/* ═══════════════════════════════════
   HELPERS
═══════════════════════════════════ */
const getCat      = id=> categories.find(c=>c.id===id);
const minToTimeStr= m=> `${String(Math.floor(m/60)%24).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const timeStrToMin= s=>{ const[h,m]=s.split(':').map(Number);return h*60+m; };
function minToLabel(m){
  const h=Math.floor(m/60)%24,mn=m%60,ap=h<12?'am':'pm',h12=h===0?12:h>12?h-12:h;
  return mn===0?`${h12}${ap}`:`${h12}:${String(mn).padStart(2,'0')}`;
}
function fmtDur(t){
  const h=Math.floor(t/60),m=t%60;
  if(h===0)return`${m}m`;if(m===0)return`${h}h`;return`${h}h ${m}m`;
}
function isSleepMin(m){
  if(wakeMin<=sleepMin)return m<wakeMin||m>=sleepMin;
  return m>=sleepMin&&m<wakeMin;
}
function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}

/* ── Merge overlapping intervals (for correct free-time calc) ── */
function mergeIntervals(intervals){
  if(!intervals.length)return[];
  const sorted=[...intervals].sort((a,b)=>a[0]-b[0]);
  const merged=[sorted[0]];
  for(let i=1;i<sorted.length;i++){
    const last=merged[merged.length-1];
    if(sorted[i][0]<=last[1])last[1]=Math.max(last[1],sorted[i][1]);
    else merged.push([...sorted[i]]);
  }
  return merged;
}

/* ═══════════════════════════════════
   UNDO
═══════════════════════════════════ */
function undo(){
  if(!undoStack.length)return;
  blocks=JSON.parse(undoStack.pop());
  renderBlocks();refreshStats();saveToStorage();
  showToast('Undone');
}
function showToast(msg){
  const t=document.getElementById('undo-toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),1600);
}

  ['wake-select','sleep-select'].forEach(id=>{
    const sel=document.getElementById(id);sel.innerHTML='';
    for(let h=0;h<24;h++)for(let m=0;m<60;m+=30){

═══════════════════════════════════ */
function buildGrid(){ buildTimeCol();buildDays();renderBlocks();updateZoomLabel(); }

function buildTimeCol(){
  const col=document.getElementById('time-col');
  col.querySelectorAll('.time-label').forEach(e=>e.remove());
  const showHalf= ZOOM_LEVELS[zoomIdx]>=80; // show :30 labels when zoomed in
  for(let h=0;h<24;h++){
    const l=document.createElement('div');
    l.className='time-label hour-lbl';
    l.style.top=(var_headerH()+minToY(h*60))+'px';
    l.textContent=minToLabel(h*60);
    col.appendChild(l);
    if(showHalf){
      const l2=document.createElement('div');
      l2.className='time-label half-lbl';
      l2.style.top=(var_headerH()+minToY(h*60+30))+'px';
      l2.textContent=minToLabel(h*60+30);
      col.appendChild(l2);
    }
  }
}
function var_headerH(){ return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-h'))||40; }

function buildDays(){
  const area=document.getElementById('days-area');area.innerHTML='';
  for(let di=0;di<7;di++){
    const isWeekend=(di===5||di===6);
    const col=document.createElement('div');col.className='day-col';col.id=`dc-${di}`;
    // Day header with name + scheduled total badge
    const head=document.createElement('div');
    head.className='day-head'+(isWeekend?' weekend':'');
    head.id=`dh-${di}`;
    const nm=document.createElement('div');nm.className='day-head-name';nm.textContent=DAYS_SHORT[di];
    const tot=document.createElement('div');tot.className='day-head-total';tot.id=`dht-${di}`;tot.textContent='';
    head.appendChild(nm);head.appendChild(tot);
    head.addEventListener('click',()=>{ if(pasteMode)pasteBlock(di); });
    col.appendChild(head);
    const body=document.createElement('div');body.className='day-body';body.id=`db-${di}`;
    body.style.height=dayH()+'px';
    drawLines(body);attachDayDrag(body,di);
    col.appendChild(body);area.appendChild(col);
  }
}

function drawLines(body){
  body.querySelectorAll('.h-line').forEach(e=>e.remove());
  // Sleep bands
  let inS=false,bS=0;
  for(let m=0;m<=MINS;m++){
    const s=isSleepMin(m%MINS||0);
    if(s&&!inS){bS=m;inS=true;}
    if(!s&&inS){addBand(body,bS,m);inS=false;}
  }
  if(inS)addBand(body,bS,MINS);
  // Hour + half lines
  for(let h=0;h<24;h++){
    addHLine(body,'hour',h*60);
    addHLine(body,'half',h*60+30);
  }
}
function addBand(body,s,e){
  const d=document.createElement('div');d.className='h-line sleep';
  d.style.top=minToY(s)+'px';d.style.height=Math.max(1,minToY(e-s))+'px';
  body.appendChild(d);
}
function addHLine(body,cls,m){
  const d=document.createElement('div');d.className=`h-line ${cls}`;
  d.style.top=minToY(m)+'px';body.appendChild(d);
}
function refreshSleepZones(){ document.querySelectorAll('.day-body').forEach(b=>drawLines(b)); }

function refreshDayTotals(){

/* ═══════════════════════════════════
   DRAG TO CREATE
═══════════════════════════════════ */
let selState=null,selGhost=null;
const TT=document.getElementById('time-tooltip');

function attachDayDrag(body,di){
  body.addEventListener('mousedown',e=>{
    if(e.button!==0||e.target.closest('.block'))return;
    if(pasteMode)return;
    e.preventDefault();
    const rect=body.getBoundingClientRect();
    const startMin=clamp(yToMinSnap(e.clientY-rect.top),0,MINS);
    selState={di,startMin,endMin:startMin+15};
    selGhost=document.createElement('div');selGhost.className='sel-ghost';
    body.appendChild(selGhost);updateGhost(body);TT.style.display='block';
    const onMove=ev=>{
      const r=body.getBoundingClientRect();
      const cur=clamp(yToMinSnap(ev.clientY-r.top),0,MINS);
      selState.endMin=Math.max(selState.startMin+15,cur);
      updateGhost(body);
      TT.textContent=`${minToLabel(selState.startMin)} – ${minToLabel(selState.endMin)}`;
      TT.style.left=(ev.clientX+14)+'px';TT.style.top=(ev.clientY-10)+'px';
    };
    const onUp=()=>{
      window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);
      TT.style.display='none';
      if(selGhost){selGhost.remove();selGhost=null;}
      const s=selState;selState=null;
      if(!s||s.endMin-s.startMin<5)return;
      const fc=categories.find(c=>c.visible);
      openModal('new',{dayIdx:s.di,startMin:s.startMin,endMin:s.endMin,catId:fc?.id||categories[0]?.id,title:'',notes:''});
    };
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  });

  // ── Hover over empty space: show gap duration between nearest visible blocks ──
  body.addEventListener('mousemove',e=>{
    if(selState||pasteMode||e.target.closest('.block'))return;
    const rect=body.getBoundingClientRect();
    const hoverMin=yToMin(e.clientY-rect.top);
    const visBlocks=blocks.filter(b=>b.dayIdx===di&&getCat(b.catId)?.visible);
    let gapStart=wakeMin;
    visBlocks.forEach(b=>{if(b.endMin<=hoverMin&&b.endMin>gapStart)gapStart=b.endMin;});
    let gapEnd=(sleepMin>wakeMin)?sleepMin:MINS;
    visBlocks.forEach(b=>{if(b.startMin>=hoverMin&&b.startMin<gapEnd)gapEnd=b.startMin;});
    const gapMins=Math.max(0,gapEnd-gapStart);
    if(gapMins>0&&hoverMin>=gapStart&&hoverMin<=gapEnd){
      TT.style.display='block';
      TT.textContent=fmtDur(gapMins)+' free';
      TT.style.left=(e.clientX+14)+'px';
      TT.style.top=(e.clientY-10)+'px';
    }else{
      TT.style.display='none';
    }
  });
  body.addEventListener('mouseleave',()=>{if(!selState)TT.style.display='none';});
}
function updateGhost(body){
  if(!selGhost||!selState)return;
  selGhost.style.top=minToY(selState.startMin)+'px';
  selGhost.style.height=Math.max(4,minToY(selState.endMin-selState.startMin))+'px';
}

═══════════════════════════════════ */
function copyBlock(b){
  copiedBlock={...b};
  pasteMode=true;
  document.getElementById('copy-banner').classList.add('show');
  document.querySelectorAll('.day-head').forEach(h=>h.classList.add('paste-target'));
  document.getElementById('tb-hint').textContent='Click a day header to paste · Esc to cancel';
}
function exitPasteMode(){
  pasteMode=false;
  document.getElementById('copy-banner').classList.remove('show');
  document.querySelectorAll('.day-head').forEach(h=>h.classList.remove('paste-target'));
  document.getElementById('tb-hint').textContent='Drag to create · Click to edit · Ctrl+C on block to copy';
}
function pasteBlock(di){
  if(!copiedBlock)return;
  pushUndo();
  blocks.push({...copiedBlock,id:uid(),dayIdx:di});
  // keep copiedBlock alive so user can paste again to another day
  // only exit paste mode after user presses Esc or starts a new action
  renderBlocks();refreshStats();saveToStorage();
  showToast('Pasted to '+DAYS_SHORT[di]);
}

/* ═══════════════════════════════════
   OVERLAP LAYOUT
═══════════════════════════════════ */
function computeLayout(dayBlocks){
  const sorted=[...dayBlocks].sort((a,b)=>a.startMin-b.startMin);
  const info={};const cols=[];
  sorted.forEach(b=>{
    let placed=false;
    for(let ci=0;ci<cols.length;ci++){
      if(cols[ci]<=b.startMin){info[b.id]={col:ci};cols[ci]=b.endMin;placed=true;break;}
    }
    if(!placed){info[b.id]={col:cols.length};cols.push(b.endMin);}
  });
  sorted.forEach(b=>{
    let maxCol=0;
    sorted.forEach(o=>{if(o.startMin<b.endMin&&o.endMin>b.startMin)maxCol=Math.max(maxCol,info[o.id].col);});
    info[b.id].totalCols=maxCol+1;
  });
  return info;
}

/* ═══════════════════════════════════
   RENDER BLOCKS
═══════════════════════════════════ */
function renderBlocks(){
  document.querySelectorAll('.block').forEach(e=>e.remove());
  const notesColor=isDark()?'rgba(255,255,255,0.65)':'rgba(0,0,0,0.55)';
  const MICRO_PX=22; // blocks shorter than this px get micro treatment

  for(let di=0;di<7;di++){
    const body=document.getElementById(`db-${di}`);if(!body)continue;
    const dayBlocks=blocks.filter(b=>b.dayIdx===di);
    const layout=computeLayout(dayBlocks);
    dayBlocks.forEach(b=>{
      const cat=getCat(b.catId);if(!cat)return;
      const{col,totalCols}=layout[b.id]||{col:0,totalCols:1};
      const heightPx=Math.max(8,minToY(b.endMin-b.startMin));
      const isMicro=heightPx<MICRO_PX;

      const el=document.createElement('div');
      el.className='block'+(cat.visible?'':' hidden')+(isMicro?' micro':'');
      el.id=`blk-${b.id}`;
      el.style.top=minToY(b.startMin)+'px';
      el.style.height=heightPx+'px';
      // Stacking layout
      const GAP=3,IND=16;
      el.style.left=`${GAP+col*IND}px`;
      el.style.right=`${GAP+Math.max(0,(totalCols-col-1)*IND*0.4)}px`;
      el.style.zIndex=5+col;
      // Color intensity by depth
      const fillAlpha=col===0?0.15:Math.min(0.55,0.15+col*0.15);
      el.style.background=hexToRgba(cat.color,fillAlpha);
      el.style.borderLeft=`3px solid ${cat.color}`;

      // Tooltip on micro blocks so you can still read them
      if(isMicro){
        el.title=`${b.title||cat.name} · ${minToLabel(b.startMin)}–${minToLabel(b.endMin)}`;
      }

      const inner=document.createElement('div');inner.className='block-body';
      if(b.title){
        const t=document.createElement('div');t.className='block-title';t.textContent=b.title;inner.appendChild(t);
      }
      if(b.notes&&!isMicro){
        const n=document.createElement('div');n.className='block-notes';
        n.style.color=notesColor;n.textContent=b.notes;inner.appendChild(n);
      }
      el.appendChild(inner);

      const rz=document.createElement('div');rz.className='block-resize';el.appendChild(rz);
      attachBlock(el,b,rz);
      body.appendChild(el);
    });
  }
  refreshDayTotals();
}

function attachBlock(el,b,rz){
  let moved=false;

  el.addEventListener('mousedown',e=>{
    if(e.button!==0||e.target===rz||rz.contains(e.target))return;
    // Ctrl/Cmd+click = copy
    if(e.ctrlKey||e.metaKey){e.preventDefault();e.stopPropagation();copyBlock(b);return;}
    e.preventDefault();e.stopPropagation();
    moved=false;
    // Snapshot BEFORE move starts (fix for undo mid-drag bug)
    const snapBefore=JSON.stringify(blocks);
    const sy=e.clientY,os=b.startMin,dur=b.endMin-b.startMin;
    const onMove=ev=>{
      const dm=Math.round((ev.clientY-sy)/pxPerMin()/15)*15;
      if(Math.abs(dm)>=1)moved=true;
      b.startMin=clamp(os+dm,0,MINS-dur);b.endMin=b.startMin+dur;
      el.style.top=minToY(b.startMin)+'px';
      TT.style.display='block';
      TT.textContent=`${minToLabel(b.startMin)} – ${minToLabel(b.endMin)}`;
      TT.style.left=(ev.clientX+14)+'px';TT.style.top=(ev.clientY-10)+'px';
    };
    const onUp=()=>{
      window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);
      TT.style.display='none';
      if(!moved){openModal('edit',{...b});}
      else{
        // push the before-move snapshot so undo goes back to pre-drag position
        undoStack.push(snapBefore);if(undoStack.length>60)undoStack.shift();
        renderBlocks();refreshStats();saveToStorage();
      }
    };
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  });

  rz.addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();
    const snapBefore=JSON.stringify(blocks);
    const sy=e.clientY,oe=b.endMin;
    const onMove=ev=>{
      const dm=Math.round((ev.clientY-sy)/pxPerMin()/15)*15;
      b.endMin=clamp(oe+dm,b.startMin+5,MINS);
      el.style.height=Math.max(8,minToY(b.endMin-b.startMin))+'px';
      TT.style.display='block';
      TT.textContent=`→ ${minToLabel(b.endMin)} (${fmtDur(b.endMin-b.startMin)})`;
      TT.style.left=(ev.clientX+14)+'px';TT.style.top=(ev.clientY-10)+'px';
    };
    const onUp=()=>{
      window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);
      TT.style.display='none';
      undoStack.push(snapBefore);if(undoStack.length>60)undoStack.shift();
      renderBlocks();refreshStats();saveToStorage();
    };
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  });
}

/* ═══════════════════════════════════
   CATEGORY SIDEBAR
═══════════════════════════════════ */
function renderCatList(){
  const list=document.getElementById('cat-list');list.innerHTML='';
  categories.forEach(cat=>{
    const item=document.createElement('div');item.className='cat-item';
    // Visibility check
    const chk=document.createElement('div');
    chk.className='cat-check'+(cat.visible?' checked':'');
    chk.style.background=cat.visible?cat.color:'';
    chk.style.borderColor=cat.visible?cat.color:'';
    chk.innerHTML=`<svg width="8" height="8" viewBox="0 0 8 8"><path d="M1.5 4l2 2L6.5 2" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    chk.addEventListener('click',()=>{cat.visible=!cat.visible;saveToStorage();renderCatList();refreshBlockVisibility();refreshStats();});
    item.appendChild(chk);
    // Color swatch (editable)
    const sw=document.createElement('div');sw.className='cat-color-swatch';sw.style.background=cat.color;sw.title='Change color';
    const ci=document.createElement('input');ci.type='color';ci.value=cat.color;
    ci.addEventListener('input',e=>{cat.color=e.target.value;sw.style.background=cat.color;});
    ci.addEventListener('change',()=>{saveToStorage();renderCatList();renderBlocks();refreshStats();});
    sw.appendChild(ci);item.appendChild(sw);
    // Inline rename
    const nm=document.createElement('input');nm.type='text';nm.className='cat-name-input';
    nm.value=cat.name;nm.maxLength=24;nm.title='Click to rename';
    nm.addEventListener('change',()=>{const v=nm.value.trim();if(v){cat.name=v;saveToStorage();renderBlocks();refreshStats();}else nm.value=cat.name;});
    nm.addEventListener('keydown',e=>{if(e.key==='Enter')nm.blur();if(e.key==='Escape'){nm.value=cat.name;nm.blur();}});
    nm.addEventListener('mousedown',e=>e.stopPropagation());
    item.appendChild(nm);
    // Hours badge
    const totalMins=blocks.filter(b=>b.catId===cat.id).reduce((s,b)=>s+b.endMin-b.startMin,0);
    const hrs=document.createElement('span');hrs.className='cat-hrs';hrs.textContent=fmtDur(totalMins);item.appendChild(hrs);
    // Delete (with undo support)
    const del=document.createElement('button');del.className='cat-del-btn';del.innerHTML='×';del.title='Delete category';
    del.addEventListener('click',()=>{
      if(blocks.some(b=>b.catId===cat.id)&&!confirm(`Delete "${cat.name}"? All its blocks will be removed.`))return;
      pushUndo(); // deletions are now undoable
      blocks=blocks.filter(b=>b.catId!==cat.id);
      categories=categories.filter(c=>c.id!==cat.id);
      saveToStorage();renderCatList();renderBlocks();refreshStats();
    });
    item.appendChild(del);
    list.appendChild(item);
  });
}

function refreshBlockVisibility(){
  categories.forEach(cat=>{
    blocks.filter(b=>b.catId===cat.id).forEach(b=>{
      const el=document.getElementById(`blk-${b.id}`);
      if(el)el.classList.toggle('hidden',!cat.visible);
    });
  });
}

/* ═══════════════════════════════════
   STATS  (free time uses merged intervals)
═══════════════════════════════════ */
function refreshStats(){
  // Sleep
  let sleepMins=0;
  for(let m=0;m<MINS;m++)if(isSleepMin(m))sleepMins++;
  document.getElementById('sleep-stat').textContent=
    `Sleep: ${fmtDur(sleepMins)}/day · ${fmtDur(sleepMins*7)}/wk`;

  // Per-category totals
  const tot={};
  blocks.forEach(b=>{tot[b.catId]=(tot[b.catId]||0)+(b.endMin-b.startMin);});

  // Free time: awake hours minus MERGED scheduled intervals (avoids double-counting overlaps)
  const awakePerWeek=(MINS-sleepMins)*7;
  let scheduledUnique=0;
  for(let di=0;di<7;di++){
    const dayBlocks=blocks.filter(b=>b.dayIdx===di);
    const intervals=dayBlocks.map(b=>[b.startMin,b.endMin]);
    const merged=mergeIntervals(intervals);
    // only count awake portion
    merged.forEach(([s,e])=>{
      // clip to awake windows
      // simple approach: iterate through and count non-sleep minutes
      for(let m=s;m<e;m++) if(!isSleepMin(m)) scheduledUnique++;
    });
  }
  const freeMins=Math.max(0,awakePerWeek-scheduledUnique);

  const sl=document.getElementById('stats-list');sl.innerHTML='';
  const maxMins=Math.max(sleepMins*7,scheduledUnique,freeMins,1);
  sl.appendChild(mkStat('#7b7fd4','Sleep',sleepMins*7,maxMins));
  categories.forEach(cat=>sl.appendChild(mkStat(cat.color,cat.name,tot[cat.id]||0,maxMins)));
  sl.appendChild(mkStat('#b0b8c1','Free time',freeMins,maxMins,true));
  renderCatList();
}

function mkStat(color,name,totalMins,maxMins,italic){
  const r=document.createElement('div');r.className='stat-row';
  const pct=Math.min(100,totalMins/maxMins*100);
  r.innerHTML=`
    <div class="stat-top">
      <div class="stat-dot" style="background:${color}"></div>
      <span class="stat-name" style="${italic?'font-style:italic;color:var(--text-faint);':''}">${name}</span>
      <span class="stat-val" style="${italic?'color:var(--text-faint);':''}">${fmtDur(totalMins)}</span>
    </div>
    <div class="stat-track"><div class="stat-fill" style="background:${color};width:${pct}%"></div></div>`;
  return r;
}

/* ═══════════════════════════════════
   MODAL
═══════════════════════════════════ */
let mMode=null,mData={};
let chipState=Array(7).fill(false);

function buildCatSel(){
  const s=document.getElementById('f-cat');s.innerHTML='';
  categories.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name;s.appendChild(o);});
}
function buildRepeatChips(srcDay){
  const cont=document.getElementById('repeat-chips');cont.innerHTML='';
  chipState=Array(7).fill(false);
  DAYS_SHORT.forEach((d,i)=>{
    if(i===srcDay)return;
    const chip=document.createElement('div');chip.className='day-chip';chip.textContent=d;
    chip.addEventListener('click',()=>{chipState[i]=!chipState[i];chip.classList.toggle('on',chipState[i]);});
    cont.appendChild(chip);
  });
}
function openModal(mode,data){
  mMode=mode;mData=data;buildCatSel();buildRepeatChips(data.dayIdx);
  document.getElementById('modal-title-text').textContent=mode==='new'?'New Block':'Edit Block';
  document.getElementById('modal-day-info').textContent=DAYS_FULL[data.dayIdx];
  document.getElementById('f-start').value=minToTimeStr(data.startMin);
  document.getElementById('f-end').value=minToTimeStr(data.endMin);
  document.getElementById('f-title').value=data.title||'';
  document.getElementById('f-cat').value=data.catId||categories[0]?.id||'';
  document.getElementById('f-notes').value=data.notes||'';
  document.getElementById('modal-del-btn').style.display=mode==='edit'?'block':'none';
  document.getElementById('modal-dupe-btn').style.display=mode==='edit'?'block':'none';
  document.getElementById('modal-save-btn').textContent=mode==='new'?'Create block':'Save changes';
  document.getElementById('modal-backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),50);
}
function closeModal(){
  document.getElementById('modal-backdrop').classList.remove('open');
  mMode=null;mData={};
}
function saveModal(){
  const sMin=timeStrToMin(document.getElementById('f-start').value);
  const eMin=timeStrToMin(document.getElementById('f-end').value);
  if(eMin<=sMin){alert('End time must be after start time.');return;}
  const d={startMin:sMin,endMin:eMin,
    catId:document.getElementById('f-cat').value,
    title:document.getElementById('f-title').value.trim(),
    notes:document.getElementById('f-notes').value.trim()};
  pushUndo();
  if(mMode==='new'){blocks.push({id:uid(),dayIdx:mData.dayIdx,...d});}
  else{const b=blocks.find(x=>x.id===mData.id);if(b)Object.assign(b,d);}
  chipState.forEach((on,di)=>{if(!on)return;blocks.push({id:uid(),dayIdx:di,...d});});
  closeModal();renderBlocks();refreshStats();saveToStorage();
}
function deleteBlock(){
  if(!mData.id)return;
  pushUndo();
  blocks=blocks.filter(b=>b.id!==mData.id);
  closeModal();renderBlocks();refreshStats();saveToStorage();
}
function duplicateBlock(){
  if(!mData.id)return;
  const src=blocks.find(b=>b.id===mData.id);if(!src)return;
  pushUndo();
  // Place duplicate right after original, or at same time if no room
  const dur=src.endMin-src.startMin;
  const newStart=clamp(src.endMin,0,MINS-dur);
  blocks.push({...src,id:uid(),startMin:newStart,endMin:newStart+dur});
  closeModal();renderBlocks();refreshStats();saveToStorage();
  showToast('Duplicated on same day');
}

/* ═══════════════════════════════════
   EXPORT PDF
═══════════════════════════════════ */
function exportPDF(){ window.print(); }

/* ═══════════════════════════════════
   LOCAL STORAGE
═══════════════════════════════════ */
function saveToStorage(){
  try{
    localStorage.setItem('iw5_blocks',JSON.stringify(blocks));
    localStorage.setItem('iw5_cats',JSON.stringify(categories));
    localStorage.setItem('iw5_wake',wakeMin);
    localStorage.setItem('iw5_sleep',sleepMin);
    localStorage.setItem('iw5_zoom',zoomIdx);
  }catch(e){}
}
function loadFromStorage(){
  try{
    const b=localStorage.getItem('iw5_blocks');
    if(b){blocks=JSON.parse(b);nextId=Math.max(nextId,...blocks.map(x=>parseInt(x.id)||0))+1;}
    const c=localStorage.getItem('iw5_cats');if(c)categories=JSON.parse(c);
    const w=localStorage.getItem('iw5_wake');if(w!==null)wakeMin=parseInt(w);
    const s=localStorage.getItem('iw5_sleep');if(s!==null)sleepMin=parseInt(s);
    const z=localStorage.getItem('iw5_zoom');if(z!==null)zoomIdx=parseInt(z);
    const dk=localStorage.getItem('iw5_dark');if(dk!==null)applyDark(dk==='1');
  }catch(e){}
}

/* ═══════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════ */
document.addEventListener('keydown',e=>{
  const inInput=e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT';
  if(e.key==='Escape'){if(pasteMode){exitPasteMode();return;}closeModal();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!inInput){e.preventDefault();undo();}
});

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
function init(){
  loadFromStorage();
  buildTimeSelects();
  buildGrid();
  refreshStats();

  document.getElementById('wake-select').onchange=e=>{wakeMin=parseInt(e.target.value);refreshSleepZones();refreshStats();saveToStorage();};
  document.getElementById('sleep-select').onchange=e=>{sleepMin=parseInt(e.target.value);refreshSleepZones();refreshStats();saveToStorage();};
  document.getElementById('add-cat-btn').onclick=addCat;
  document.getElementById('new-cat-name').onkeydown=e=>{if(e.key==='Enter')addCat();};
  document.getElementById('modal-close-btn').onclick=closeModal;
  document.getElementById('modal-backdrop').onclick=e=>{if(e.target===document.getElementById('modal-backdrop'))closeModal();};
  document.getElementById('modal-save-btn').onclick=saveModal;
  document.getElementById('modal-del-btn').onclick=deleteBlock;
  document.getElementById('modal-dupe-btn').onclick=duplicateBlock;
  document.getElementById('undo-btn').onclick=undo;
  document.getElementById('export-btn').onclick=exportPDF;
  document.getElementById('dark-toggle').onclick=()=>applyDark(!darkMode);
}
function addCat(){
  const name=document.getElementById('new-cat-name').value.trim();if(!name)return;
  categories.push({id:uid(),name,color:document.getElementById('new-cat-color').value,visible:true});
  document.getElementById('new-cat-name').value='';
  saveToStorage();renderCatList();refreshStats();buildCatSel();
}

init();
</script>
